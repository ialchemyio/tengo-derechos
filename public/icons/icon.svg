<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" role="img" aria-label="Tengo Derechos">
  <title>Tengo Derechos</title>
  <!-- Shield: navy outer, rounded base. Pentagonal-ish silhouette. -->
  <path
    d="M110 10
       C76 10 44 18 22 30
       L22 116
       C22 168 60 208 110 228
       C160 208 198 168 198 116
       L198 30
       C176 18 144 10 110 10 Z"
    fill="#1f2c44"
  />

  <!-- Clay inner shield with subtle tonal split (right side a touch warmer). -->
  <path
    d="M110 28
       C82 28 56 35 38 45
       L38 114
       C38 156 68 188 110 204
       C152 188 182 156 182 114
       L182 45
       C164 35 138 28 110 28 Z"
    fill="#b4571f"
  />
  <path
    d="M110 28
       C138 28 164 35 182 45
       L182 114
       C182 156 152 188 110 204
       L110 28 Z"
    fill="#9a4a17"
    opacity="0.55"
  />

  <!-- Document with folded top-right corner -->
  <g transform="translate(108 50) rotate(6)">
    <path d="M0 0 H36 L48 12 V58 H0 Z" fill="#fbf7ef"/>
    <path d="M36 0 L48 12 H38 C36 12 36 10 36 8 Z" fill="#e9e1d3"/>
    <rect x="6" y="20" width="22" height="3" rx="1.5" fill="#1f2c44"/>
    <rect x="6" y="28" width="32" height="3" rx="1.5" fill="#1f2c44"/>
    <rect x="6" y="36" width="22" height="3" rx="1.5" fill="#1f2c44"/>
    <rect x="6" y="44" width="28" height="3" rx="1.5" fill="#1f2c44"/>
  </g>

  <!-- Three-arc signal indicator (broadcast / reach) -->
  <g
    transform="translate(154 32) rotate(-8)"
    fill="none"
    stroke="#b4571f"
    stroke-width="6"
    stroke-linecap="round"
  >
    <path d="M0 12 A12 12 0 0 1 12 0"/>
    <path d="M0 22 A22 22 0 0 1 22 0" opacity="0.7"/>
    <path d="M0 32 A32 32 0 0 1 32 0" opacity="0.4"/>
  </g>

  <!-- Continuous-line parent + child silhouette -->
  <g transform="translate(50 80)" fill="#fbf7ef">
    <!-- Parent head -->
    <circle cx="38" cy="14" r="14"/>
    <!-- Parent body that wraps around the child -->
    <path
      d="M14 86
         C14 56 26 32 42 32
         C56 32 70 42 70 60
         L70 102
         C70 116 56 122 42 122
         C26 122 14 116 14 102 Z"
    />
  </g>

  <!-- Child (overlaid in front of parent's arm cradle) -->
  <g transform="translate(50 80)" fill="#1f2c44" opacity="0.92">
    <!-- Child head -->
    <circle cx="50" cy="60" r="9"/>
    <!-- Child torso -->
    <path
      d="M34 72
         C34 66 40 62 48 62
         C58 62 64 68 64 78
         L64 96
         C64 104 58 106 50 106
         C40 106 34 104 34 96 Z"
    />
  </g>
</svg>
